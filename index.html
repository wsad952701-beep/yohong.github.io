<!-- ✅ 貼在 index.html 的 </body> 前 -->
<script>
(function() {
  var bar    = document.getElementById('progressBar');
  var pct    = document.getElementById('progressPercent');
  var loader = document.getElementById('pageLoader');
  var loaderText = document.getElementById('loaderText');

  // 逐字動畫顯示品牌名
  var brand = 'OCEANMASTER';
  loaderText.innerHTML = '';
  brand.split('').forEach(function(ch, i) {
    var span = document.createElement('span');
    span.textContent = ch;
    span.style.animationDelay = (0.05 + i * 0.08) + 's';
    loaderText.appendChild(span);
  });

  // 每 100ms +1%（= 每秒 +10%），到 99% 停住
  var current = 0;
  var timer = setInterval(function() {
    if (current >= 99) {
      clearInterval(timer);
      return;
    }
    current += 1;
    bar.style.width = current + '%';
    pct.textContent = current + '%';
  }, 100);

  // 頁面真正 load 完成後：等 0.6s 再淡出 loader
  window.addEventListener('load', function() {
    setTimeout(function() {
      loader.classList.add('hidden');
    }, 600);
  });
})();
</script>
